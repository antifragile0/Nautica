name: Environment Variables Workflow

# Menentukan kapan workflow ini dijalankan
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Anda juga bisa menambahkan manual trigger
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      
    # Menggunakan secrets dalam steps
    - name: Use Environment Variables
      env:
        ROOT_DOMAIN: ${{ secrets.ROOT_DOMAIN }}
        SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
        API_KEY: ${{ secrets.API_KEY }}
        API_EMAIL: ${{ secrets.API_EMAIL }}
        ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
        ZONE_ID: ${{ secrets.ZONE_ID }}
      #run: |
        # Contoh penggunaan variables
        #echo "Using service: $SERVICE_NAME"
        #echo "Domain: $ROOT_DOMAIN"
        # Jangan print sensitive data seperti API_KEY di logs
        
    # Tambahkan steps lain sesuai kebutuhan project Anda
    # Contoh: build, test, deploy, dll
